<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLogistic | Distribució i Logística Alimentària</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Variables CSS --- */
        :root {
            --color-primary: #1a1a1a;       /* Negre elegant */
            --color-secondary: #4a4a4a;     /* Gris fosc */
            --color-accent: #2e7d32;        /* Verd corporatiu per alimentació */
            --color-bg: #ffffff;            /* Fons principal blanc */
            --color-bg-alt: #f9f9f9;        /* Fons alternatiu suau */
            --color-border: #e0e0e0;
            --font-main: 'Inter', sans-serif;
            --spacing-sm: 1rem;
            --spacing-md: 2rem;
            --spacing-lg: 4rem;
            --transition: all 0.3s ease;
        }

        /* --- Reset bàsic --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            color: var(--color-primary);
            background-color: var(--color-bg);
            line-height: 1.6;
            font-weight: 300;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* --- Tipografia --- */
        h1, h2, h3 {
            font-weight: 600;
            line-height: 1.2;
            color: var(--color-primary);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: var(--spacing-sm);
        }

        p {
            color: var(--color-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .section-subtitle {
            text-align: center;
            max-width: 600px;
            margin: 0 auto var(--spacing-lg) auto;
        }

        .section-title {
            text-align: center;
        }

        /* --- Estructura Global --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-sm);
        }

        section {
            padding: var(--spacing-lg) 0;
        }

        /* --- Header i Navegació --- */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--color-accent);
        }

        .nav-links {
            list-style: none;
            display: none; /* Amagat per defecte a mòbil per simplificar, es podria afegir un menú hamburguesa */
        }

        .nav-links li {
            margin-left: var(--spacing-md);
        }
